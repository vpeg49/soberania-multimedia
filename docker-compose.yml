services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    network_mode: host
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/biblioteca:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://192.168.1.77:8096
    restart: unless-stopped
